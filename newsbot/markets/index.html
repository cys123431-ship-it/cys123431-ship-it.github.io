<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>newsbot crypto | 오버뷰</title>
    <meta name="description" content="newsbot static crypto overview" />
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body class="public-app market-crypto-page crypto-page-overview">
    <nav class="surface-switcher" aria-label="View switcher">
      
      <a class="surface-link " href="../">
        News
      </a>
      
      <a class="surface-link " href="../analysis/">
        Analysis
      </a>
      
      <a class="surface-link " href="us/">
        미국주식
      </a>
      
      <a class="surface-link " href="korea/">
        한국주식
      </a>
      
      <a class="surface-link is-active" href="crypto/">
        코인
      </a>
      
    </nav>

    
    <main class="markets-shell crypto-shell-page">
      <section id="crypto-app" class="crypto-app-shell" aria-label="코인 분석 허브">
        <header class="crypto-page-hero">
          <div class="crypto-page-copy">
            <p class="analysis-eyebrow">Crypto Analysis</p>
            <h1>오버뷰</h1>
            <p>패턴, 파생 지표, 추세, 모멘텀, 변동성을 한 묶음으로 보는 정적 분석 제품입니다. 스캔 버튼은 최신 배치 스냅샷을 다시 불러옵니다.</p>
          </div>
          <div class="crypto-hero-pills">
            <span class="summary-pill">Binance USDT Perpetual</span>
            <span class="summary-pill">상위 100개 스캔</span>
            <span class="summary-pill">한국시간 표기</span>
          </div>
        </header>

        <section class="crypto-toolbar-card">
          <div class="crypto-toolbar-grid">
            <label class="scanner-field">
              <span>스캔 범위</span>
              <select id="crypto-universe-select" class="scanner-select"></select>
            </label>
            <label class="scanner-field">
              <span>타임프레임</span>
              <select id="crypto-timeframe-select" class="scanner-select"></select>
            </label>
            <button id="crypto-refresh-button" class="scanner-action-button" type="button">최신 스캔 다시 불러오기</button>
          </div>
          <p id="crypto-cooldown-text" class="scanner-cooldown-text">잠시 후 다시 시도할 수 있습니다.</p>
          <div id="crypto-status-line" class="scanner-status-line">스캐너 manifest를 불러오는 중입니다.</div>
          <div class="scanner-progress-track" aria-hidden="true">
            <span id="crypto-progress-bar" class="scanner-progress-bar"></span>
          </div>
        </section>

        <nav id="crypto-page-tabs" class="crypto-page-tabs" aria-label="코인 분석 페이지"></nav>

        <section class="crypto-summary-shell">
          <div id="crypto-summary-meta" class="scanner-summary-meta"></div>
          <div id="crypto-active-scan" class="scanner-active-scan"></div>
        </section>

        <section id="crypto-page-highlights" class="crypto-page-highlights"></section>
        <section id="crypto-page-controls" class="crypto-page-controls"></section>
        <section id="crypto-page-content" class="crypto-page-content"></section>
      </section>

      <noscript class="noscript-note">JavaScript가 있어야 코인 분석 허브를 렌더링할 수 있습니다.</noscript>
    </main>
