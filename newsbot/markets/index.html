<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>newsbot markets | 코인</title>
    <meta name="description" content="newsbot crypto dashboard shell inspired by Coinglass" />
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body class="public-app market-crypto-page">
    <nav class="surface-switcher" aria-label="View switcher">
      
      <a class="surface-link " href="../">
        News
      </a>
      
      <a class="surface-link " href="../analysis/">
        Analysis
      </a>
      
      <a class="surface-link " href="us/">
        미국주식
      </a>
      
      <a class="surface-link " href="korea/">
        한국주식
      </a>
      
      <a class="surface-link is-active" href="crypto/">
        코인
      </a>
      
    </nav>

    
    <main class="markets-shell crypto-shell-page">
      <section id="scanner-shell" class="scanner-shell-frame" aria-label="코인 패턴 스캐너">
        <header class="scanner-shell-header">
          <div class="scanner-brand-block">
            <p class="analysis-eyebrow">Scanner</p>
            <h1>하모닉 패턴 스캐너</h1>
            <p>무료 정적 배포 모드로 운영되는 코인 패턴 분석 대시보드입니다. 최신 배치 스냅샷을 다시 불러와 확인할 수 있습니다.</p>
          </div>
          <div id="scanner-control-panel" class="scanner-control-panel">
            <label class="scanner-field">
              <span>스캔 범위</span>
              <select id="scanner-universe-select" class="scanner-select"></select>
            </label>
            <label class="scanner-field">
              <span>타임프레임</span>
              <select id="scanner-timeframe-select" class="scanner-select"></select>
            </label>
            <button id="scanner-refresh-button" class="scanner-action-button" type="button">최신 스캔 다시 불러오기</button>
            <p id="scanner-cooldown-text" class="scanner-cooldown-text">잠시 후 다시 시도할 수 있습니다.</p>
            <div id="scanner-status-line" class="scanner-status-line">스캐너 manifest를 불러오는 중입니다.</div>
            <div class="scanner-progress-track" aria-hidden="true">
              <span id="scanner-progress-bar" class="scanner-progress-bar"></span>
            </div>
          </div>
        </header>

        <section class="scanner-results-panel">
          <div class="scanner-results-topline">
            <div id="scanner-summary-meta" class="scanner-summary-meta"></div>
            <div id="scanner-active-scan" class="scanner-active-scan"></div>
          </div>
          <div id="scanner-filter-tabs" class="scanner-filter-tabs" aria-label="패턴 상태 필터"></div>
          <div id="scanner-results" class="scanner-results-grid"></div>
        </section>
      </section>

      <noscript class="noscript-note">JavaScript가 있어야 코인 패턴 스캐너를 렌더링할 수 있습니다.</noscript>
    </main>
    

    
    <script id="markets-bootstrap" type="application/json">{"initial_surface":"crypto","surface_links":[{"key":"us","label":"미국주식","href":"us/"},{"key":"korea","label":"한국주식","href":"korea/"},{"key":"crypto","label":"코인","href":"crypto/"}],"scanner_manifest_url":"../data/scanner/manifest.json","overview_url":"../data/markets-overview.json","stocks_url":"../data/markets-stocks.json","korea_url":"../data/markets-korea.json","crypto_url":"../data/markets-crypto.json","status_url":"../data/markets-status.json"}</script>
    <script src="../assets/markets.js"></script>
  </body>
</html>
